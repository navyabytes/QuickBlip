<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">QuickBlip Dark Logo</title>
  <desc id="desc">Retro-tech rounded app icon in neon violet tones with chat symbol and QuickBlip wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b58be5"/>
      <stop offset="50%" stop-color="#7056ad"/>
      <stop offset="100%" stop-color="#33295a"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2b2050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#120f29" stop-opacity="0.68"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ece8f5"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#09061a" flood-opacity="0.5"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="118" y="118" width="788" height="788" rx="182" ry="182"/>
    </clipPath>
  </defs>

  <rect x="118" y="118" width="788" height="788" rx="182" fill="url(#bg)"/>
  <rect x="118" y="118" width="788" height="788" rx="182" fill="none" stroke="#d7c7f3" stroke-width="14"/>

  <g clip-path="url(#iconClip)">
    <path d="M-40 608 C210 500 426 588 690 628 C818 646 930 654 1080 610 L1080 1010 L-40 1010 Z" fill="url(#horizon)"/>
    <path d="M70 470 C290 415 544 470 804 526 C928 553 1008 569 1080 614" fill="none" stroke="#efe8ff" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
    <circle cx="746" cy="276" r="126" fill="#d3bef8" opacity="0.18" filter="url(#soft)"/>
  </g>

  <g filter="url(#drop)">
    <path d="M372 316 h282 a24 24 0 0 1 24 24 v236 a24 24 0 0 1-24 24 h-110 l-40 62 a28 28 0 0 1-46 0 l-40-62 h-46 a24 24 0 0 1-24-24 v-236 a24 24 0 0 1 24-24 z" fill="url(#card)"/>
    <rect x="424" y="386" width="206" height="8" rx="4" fill="#7e639f"/>
    <rect x="424" y="450" width="206" height="8" rx="4" fill="#63557f"/>
    <rect x="424" y="514" width="206" height="8" rx="4" fill="#4f496a"/>
    <rect x="424" y="578" width="144" height="8" rx="4" fill="#5d5677"/>
  </g>

  <text x="512" y="788" text-anchor="middle" font-family="Avenir Next, Poppins, Helvetica, Arial, sans-serif" font-size="94" font-weight="500" fill="#f6f1ff" letter-spacing="1">Quick<tspan font-weight="700">Blip</tspan></text>
</svg>
