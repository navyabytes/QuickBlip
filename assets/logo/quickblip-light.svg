<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">QuickBlip Light Logo</title>
  <desc id="desc">Retro-tech rounded app icon in warm copper tones with chat symbol and QuickBlip wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6bb72"/>
      <stop offset="52%" stop-color="#dc824e"/>
      <stop offset="100%" stop-color="#8a4b33"/>
    </linearGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b3a2f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3f241d" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffefb"/>
      <stop offset="100%" stop-color="#f2ece3"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#3a1f17" flood-opacity="0.42"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="118" y="118" width="788" height="788" rx="182" ry="182"/>
    </clipPath>
  </defs>

  <rect x="118" y="118" width="788" height="788" rx="182" ry="182" fill="url(#bg)"/>
  <rect x="118" y="118" width="788" height="788" rx="182" ry="182" fill="none" stroke="#f8e9d4" stroke-width="14"/>

  <g clip-path="url(#iconClip)">
    <path d="M-40 608 C210 500 426 588 690 628 C818 646 930 654 1080 610 L1080 1010 L-40 1010 Z" fill="url(#horizon)"/>
    <path d="M70 470 C290 415 544 470 804 526 C928 553 1008 569 1080 614" fill="none" stroke="#fff5e8" stroke-width="12" stroke-linecap="round" opacity="0.92"/>
    <circle cx="760" cy="278" r="120" fill="#ffd8a1" opacity="0.16" filter="url(#soft)"/>
  </g>

  <g filter="url(#drop)">
    <path d="M372 316 h282 a24 24 0 0 1 24 24 v236 a24 24 0 0 1-24 24 h-110 l-40 62 a28 28 0 0 1-46 0 l-40-62 h-46 a24 24 0 0 1-24-24 v-236 a24 24 0 0 1 24-24 z" fill="url(#card)"/>
    <rect x="424" y="386" width="206" height="8" rx="4" fill="#9f6a52"/>
    <rect x="424" y="450" width="206" height="8" rx="4" fill="#866165"/>
    <rect x="424" y="514" width="206" height="8" rx="4" fill="#6f5155"/>
    <rect x="424" y="578" width="144" height="8" rx="4" fill="#735e61"/>
  </g>

  <text x="512" y="788" text-anchor="middle" font-family="Avenir Next, Poppins, Helvetica, Arial, sans-serif" font-size="94" font-weight="500" fill="#fff9ef" letter-spacing="1">Quick<tspan font-weight="700">Blip</tspan></text>
</svg>
